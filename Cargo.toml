[package]
name = "qwencandle"
version = "0.0.3"
edition = "2021"

[lib]
name = "qwencandle"

[dependencies]
burn = { git = "https://github.com/tracel-ai/burn.git", tag = "v0.20.1", default-features = false, features = ["candle"] }
burn-candle = { git = "https://github.com/tracel-ai/burn.git", tag = "v0.20.1" }
candle-core = "=0.9.1"
candle-metal-kernels = "=0.9.1"
safetensors = "0.7.0"
memmap2 = "0.9"
half = { version = "2", features = ["num-traits"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokenizers = "0.22"
hf-hub = "0.5"
pyo3 = { version = "0.27", optional = true, features = ["abi3-py39", "extension-module"] }
numpy = { version = "0.27", optional = true }

[features]
default = []
metal = ["burn-candle/metal"]
cuda = ["burn-candle/cuda"]
accelerate = ["burn-candle/accelerate"]
python = ["dep:pyo3", "dep:numpy"]
