[package]
name = "qwencandle"
version = "0.1.0"
edition = "2021"

[dependencies]
candle-core = { git = "https://github.com/huggingface/candle.git", rev = "34625ab6" }
candle-nn = { git = "https://github.com/huggingface/candle.git", rev = "34625ab6" }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokenizers = "0.22"
hf-hub = "0.5"

[features]
default = []
metal = ["candle-core/metal", "candle-nn/metal"]
cuda = ["candle-core/cuda", "candle-nn/cuda"]
accelerate = ["candle-nn/accelerate"]
